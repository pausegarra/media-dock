[package]
name = "media-dock"
version = "1.0.0"
edition = "2024"
build = "build.rs"

[dependencies]
iced = { version = "0.12", features = ["tokio", "image", "svg"] }
rfd = "0.14"
open = "5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
ureq = { version = "2", default-features = true }
zip = { version = "2", default-features = false, features = ["deflate"] }
tar = "0.4"
xz2 = "0.1"

[target.'cfg(windows)'.build-dependencies]
winres = "0.1"

[package.metadata.bundle]
name = "Media Dock"
identifier = "com.pausegarra.media-dock"
icon = ["assets/icons/macos/AppIcon.icns"]
osx_minimum_system_version = "10.15"
category = "Utility"
