name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate SemVer tag
    runs-on: ubuntu-latest
    steps:
      - name: Reject non SemVer tags
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${TAG}' does not match MAJOR.MINOR.PATCH"
            exit 1
          fi

  create-release:
    name: Create draft release
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release (draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --draft

  package-msi:
    name: Package MSI
    needs: [create-release]
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install WiX Toolset
        shell: powershell
        run: choco install wixtoolset -y

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Create ZIP archive
        shell: powershell
        run: |
          Compress-Archive -Path "target/x86_64-pc-windows-msvc/release/media-dock.exe" -DestinationPath "media-dock-windows-x86_64.zip"

      - name: Upload ZIP to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "media-dock-windows-x86_64.zip" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Build MSI package
        run: cargo wix --no-build --output media-dock-windows-x86_64.msi wix/main.wxs

      - name: Upload MSI to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "media-dock-windows-x86_64.msi" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  package-dmg:
    name: Package DMG ${{ matrix.asset_suffix }}
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            asset_suffix: macos-x86_64

          - runner: macos-latest
            rust_target: aarch64-apple-darwin
            asset_suffix: macos-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install packaging tools
        shell: bash
        run: |
          cargo install cargo-bundle --locked
          brew install create-dmg

      - name: Build app bundle
        run: cargo bundle --release --target ${{ matrix.rust_target }}

      - name: Create tar.gz archive
        shell: bash
        env:
          TARGET: ${{ matrix.rust_target }}
          ARCHIVE_NAME: media-dock-${{ matrix.asset_suffix }}.tar.gz
        run: |
          cd "target/${TARGET}/release"
          tar -czf "../../../${ARCHIVE_NAME}" "media-dock"

      - name: Upload tar.gz to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE_NAME: media-dock-${{ matrix.asset_suffix }}.tar.gz
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${ARCHIVE_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Build DMG package
        shell: bash
        env:
          TARGET: ${{ matrix.rust_target }}
          DMG_NAME: media-dock-${{ matrix.asset_suffix }}.dmg
        run: |
          APP_DIR="target/${TARGET}/release/bundle/osx"
          rm -f "${DMG_NAME}"
          create-dmg \
            --dmg-title "Media Dock" \
            "${DMG_NAME}" \
            "${APP_DIR}"

      - name: Upload DMG to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DMG_NAME: media-dock-${{ matrix.asset_suffix }}.dmg
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${DMG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  package-deb:
    name: Package DEB
    needs: [create-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Create tar.gz archive
        shell: bash
        run: |
          cd "target/x86_64-unknown-linux-gnu/release"
          tar -czf "../../../media-dock-linux-x86_64.tar.gz" "media-dock"

      - name: Upload tar.gz to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "media-dock-linux-x86_64.tar.gz" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Build DEB package
        run: cargo deb --no-build --target x86_64-unknown-linux-gnu

      - name: Rename DEB package
        shell: bash
        run: mv target/x86_64-unknown-linux-gnu/debian/*.deb media-dock-linux-x86_64.deb

      - name: Upload DEB to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "media-dock-linux-x86_64.deb" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
